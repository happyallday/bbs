version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: bbs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bbs
      MYSQL_USER: bbs_user
      MYSQL_PASSWORD: bbs_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    networks:
      - bbs-network

  redis:
    image: redis:7-alpine
    container_name: bbs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bbs-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bbs-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bbs?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: bbs_user
      SPRING_DATASOURCE_PASSWORD: bbs_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - bbs-network

  nginx:
    image: nginx:alpine
    container_name: bbs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - bbs-network

volumes:
  mysql-data:
  redis-data:

networks:
  bbs-network:
    driver: bridge